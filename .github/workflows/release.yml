name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则自动使用日期格式）'
        required: false
        default: ''
      prerelease:
        description: '标记为预发布'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Compute version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(date -u +%y.%-m.%d)" >> $GITHUB_OUTPUT
          fi

  publish:
    name: Build (${{ matrix.rid }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libice-dev libsm-dev libfontconfig1-dev

      - name: Publish CLI
        run: >
          dotnet publish CrypVol.Cli/CrypVol.Cli.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=true
          -o publish/cli

      - name: Publish GUI
        run: >
          dotnet publish CrypVol/CrypVol.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -o publish/gui

      - name: Package
        shell: bash
        run: |
          cd publish
          tar -czf "../CrypVol-CLI-${{ needs.version.outputs.tag }}-${{ matrix.rid }}.tar.gz" cli
          tar -czf "../CrypVol-GUI-${{ needs.version.outputs.tag }}-${{ matrix.rid }}.tar.gz" gui

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.rid }}
          path: |
            CrypVol-CLI-*.tar.gz
            CrypVol-GUI-*.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    needs: [version, publish]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: true
          files: packages/*.tar.gz
