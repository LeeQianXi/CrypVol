name: 🐛 Bug 报告
description: 报告一个 bug 以帮助我们改进
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述 bug 是什么
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按顺序列出复现步骤
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: 例如 Windows 11 / macOS 14 / Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CrypVol 版本
      placeholder: 例如 v1.0.0
    validations:
      required: true
  - type: input
    id: dotnet
    attributes:
      label: .NET 版本
      placeholder: 例如 10.0.0
  - type: dropdown
    id: install
    attributes:
      label: 安装方式
      options:
        - 源码构建
        - 预编译二进制
        - 包管理器
        - 其他
  - type: textarea
    id: extra
    attributes:
      label: 附加信息
      description: 日志、截图或其他有助于诊断的信息
