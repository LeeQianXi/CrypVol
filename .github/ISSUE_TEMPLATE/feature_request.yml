name: 💡 功能请求
description: 为新功能或改进提出建议
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰简洁地描述你想要的功能
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: 使用场景
      description: 描述这个功能能解决什么问题
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 如果你有具体的实现思路，可以在这里描述
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否有其他替代方案可以实现同样目的
  - type: textarea
    id: extra
    attributes:
      label: 附加信息
      description: 任何有助于说明的截图、参考链接等
